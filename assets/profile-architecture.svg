<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">ntoskrnl7 portfolio architecture map</title>
  <desc id="desc">A layered map from kernel drivers and CRT/STL support to Win32 APIs, Electron and Chromium DevTools Protocol, and typed application messaging.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827" />
      <stop offset="0.52" stop-color="#0f172a" />
      <stop offset="1" stop-color="#18212f" />
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8" />
      <stop offset="0.5" stop-color="#a3e635" />
      <stop offset="1" stop-color="#f59e0b" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.35" />
    </filter>
  </defs>

  <rect width="1200" height="360" rx="26" fill="url(#bg)" />
  <path d="M50 274 C230 218, 356 326, 550 268 C734 214, 840 124, 1150 86" fill="none" stroke="url(#line)" stroke-width="3" opacity="0.5" />
  <path d="M62 282 C250 235, 372 309, 560 282 C746 255, 882 166, 1140 118" fill="none" stroke="#64748b" stroke-width="1.2" opacity="0.35" />

  <text x="56" y="74" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="40" font-weight="700">ntoskrnl7</text>
  <text x="56" y="112" fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20">Systems, native runtime, browser engine integration, and typed application protocols</text>
  <text x="56" y="145" fill="#94a3b8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">Building reusable layers where kernel code, Win32 APIs, Electron/Chromium, Node.js, and TypeScript meet.</text>

  <g filter="url(#shadow)">
    <rect x="56" y="190" width="190" height="96" rx="16" fill="#0f766e" opacity="0.94" />
    <text x="78" y="226" fill="#ecfeff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Kernel Runtime</text>
    <text x="78" y="252" fill="#ccfbf1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13">crtsys / ldk</text>
    <text x="78" y="273" fill="#a7f3d0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12">CRT, STL, WDK, NTL</text>

    <rect x="280" y="190" width="190" height="96" rx="16" fill="#1d4ed8" opacity="0.94" />
    <text x="302" y="226" fill="#eff6ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Native Windows</text>
    <text x="302" y="252" fill="#dbeafe" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13">win32-ex</text>
    <text x="302" y="273" fill="#bfdbfe" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12">services, tokens, sessions</text>

    <rect x="504" y="190" width="190" height="96" rx="16" fill="#7c3aed" opacity="0.94" />
    <text x="526" y="226" fill="#faf5ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">C++ Utilities</text>
    <text x="526" y="252" fill="#ede9fe" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13">ext / util-linux-cpp</text>
    <text x="526" y="273" fill="#ddd6fe" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12">process, result, URI, units</text>

    <rect x="728" y="190" width="190" height="96" rx="16" fill="#b45309" opacity="0.94" />
    <text x="750" y="226" fill="#fff7ed" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Electron / CDP</text>
    <text x="750" y="252" fill="#ffedd5" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13">electron-cdp-utils</text>
    <text x="750" y="273" fill="#fed7aa" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12">contexts, workers, protocols</text>

    <rect x="952" y="190" width="190" height="96" rx="16" fill="#be123c" opacity="0.94" />
    <text x="974" y="226" fill="#fff1f2" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Typed Messaging</text>
    <text x="974" y="252" fill="#ffe4e6" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13">typed-message-transport</text>
    <text x="974" y="273" fill="#fecdd3" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12">IPC, channels, serialization</text>
  </g>

  <g fill="#64748b" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12">
    <text x="56" y="326">C++14/17/20</text>
    <text x="174" y="326">Windows Kernel</text>
    <text x="314" y="326">Win32</text>
    <text x="390" y="326">CMake</text>
    <text x="474" y="326">Electron</text>
    <text x="570" y="326">Chromium CDP</text>
    <text x="706" y="326">TypeScript</text>
    <text x="812" y="326">Node.js</text>
    <text x="900" y="326">Rust</text>
    <text x="968" y="326">Protocol Design</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">ntoskrnl7 Electron and Chromium feature-port portfolio</title>
  <desc id="desc">A portfolio banner showing implementation of missing Electron and Chromium runtime capabilities, including Linux VA-API HEVC, Widevine CDM, preload scopes, trusted input, text APIs, print handling, user-agent client hints, and reusable port bundles.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1120" />
      <stop offset="0.48" stop-color="#111827" />
      <stop offset="1" stop-color="#172033" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8" />
      <stop offset="0.42" stop-color="#22c55e" />
      <stop offset="0.72" stop-color="#f59e0b" />
      <stop offset="1" stop-color="#fb7185" />
    </linearGradient>
    <filter id="shadow" x="-12%" y="-22%" width="124%" height="154%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.35" />
    </filter>
  </defs>

  <rect width="1200" height="420" rx="28" fill="url(#bg)" />
  <path d="M54 318 C214 262, 306 356, 470 302 C638 247, 705 104, 900 136 C1030 157, 1083 84, 1148 58" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.58" />
  <path d="M58 335 C242 284, 356 340, 530 317 C711 294, 814 204, 1140 172" fill="none" stroke="#64748b" stroke-width="1.2" opacity="0.34" />

  <text x="56" y="66" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="38" font-weight="700">ntoskrnl7</text>
  <text x="56" y="105" fill="#dbeafe" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="600">Implementing Electron and Chromium capabilities the stock runtime does not provide</text>
  <text x="56" y="136" fill="#94a3b8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">Reusable source ports for media pipelines, runtime APIs, browser identity, trusted input, text state, preload injection, DRM packaging, and release builds.</text>

  <g filter="url(#shadow)">
    <rect x="56" y="178" width="236" height="120" rx="18" fill="#0f766e" opacity="0.96" />
    <text x="78" y="213" fill="#ecfeff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="700">Chromium Media</text>
    <text x="78" y="239" fill="#ccfbf1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">Linux VA-API HEVC/H.265</text>
    <text x="78" y="261" fill="#a7f3d0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12">NVIDIA import, Main10, 4:4:4</text>
    <text x="78" y="282" fill="#a7f3d0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12">WebCodecs and GPU fallback control</text>

    <rect x="324" y="178" width="236" height="120" rx="18" fill="#1d4ed8" opacity="0.96" />
    <text x="346" y="213" fill="#eff6ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="700">Electron Runtime APIs</text>
    <text x="346" y="239" fill="#dbeafe" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">preload, input, text, print</text>
    <text x="346" y="261" fill="#bfdbfe" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12">workers, service workers, frames</text>
    <text x="346" y="282" fill="#bfdbfe" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12">trusted dispatch and caret state</text>

    <rect x="592" y="178" width="236" height="120" rx="18" fill="#7c3aed" opacity="0.96" />
    <text x="614" y="213" fill="#faf5ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="700">Browser Identity / CDM</text>
    <text x="614" y="239" fill="#ede9fe" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">UA Client Hints and Widevine</text>
    <text x="614" y="261" fill="#ddd6fe" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12">version-aware CDM packaging</text>
    <text x="614" y="282" fill="#ddd6fe" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12">app/session/WebContents scope</text>

    <rect x="860" y="178" width="284" height="120" rx="18" fill="#b45309" opacity="0.96" />
    <text x="882" y="213" fill="#fff7ed" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="700">Reusable Port Bundles</text>
    <text x="882" y="239" fill="#ffedd5" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">Electron 41 / 42 / main</text>
    <text x="882" y="261" fill="#fed7aa" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12">Chromium patch-stack registration</text>
    <text x="882" y="282" fill="#fed7aa" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12">upgrade, apply, package, release</text>
  </g>

  <g fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="600">
    <rect x="58" y="336" width="1084" height="42" rx="21" fill="#0f172a" opacity="0.74" />
    <text x="86" y="362">VA-API</text>
    <text x="160" y="362">HEVC/H.265</text>
    <text x="272" y="362">WebCodecs</text>
    <text x="378" y="362">Widevine/CDM</text>
    <text x="506" y="362">Preload Realms</text>
    <text x="640" y="362">Trusted Input</text>
    <text x="762" y="362">Editable Text</text>
    <text x="884" y="362">Print/PiP/Dialog</text>
    <text x="1028" y="362">UA-CH</text>
  </g>
</svg>
